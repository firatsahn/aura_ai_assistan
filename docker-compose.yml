# Brings the whole system up with a single `docker compose up`.
# Ships the vector store (Step 2) and the RAG API (Step 3a); the frontend
# service lands in a later step.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aura_qdrant
    ports:
      - "6333:6333"   # REST API + web UI (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # Qdrant's image has no curl/wget; use the bundled gRPC health probe.
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RAG API (Step 3a). POST /query -> grounded answer (or abstention) + sources.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aura_backend
    ports:
      - "4242:4242"   # http://localhost:4242  (POST /query, GET /health, /docs)
    env_file:
      - .env          # OPENAI_API_KEY, GENERATION_MODEL, ABSTENTION_THRESHOLD, ...
    environment:
      # Override the .env value: inside the network Qdrant is reached by service
      # name, not localhost. `environment` takes precedence over `env_file`.
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
