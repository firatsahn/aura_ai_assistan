# Brings the whole system up with a single `docker compose up`.
# Step 2 ships only the vector store; the backend/frontend services land in
# later steps (stubbed below so the topology is visible).
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aura_qdrant
    ports:
      - "6333:6333"   # REST API + web UI (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # Qdrant's image has no curl/wget; use the bundled gRPC health probe.
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TODO: backend service (Step 4 — RAG API). Will connect to Qdrant via the
  # service name, i.e. QDRANT_URL=http://qdrant:6333.
  #
  # backend:
  #   build: ./backend
  #   environment:
  #     QDRANT_URL: http://qdrant:6333
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy

volumes:
  qdrant_storage:
